services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: annuaire-backend
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///./data/contacts.db
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
